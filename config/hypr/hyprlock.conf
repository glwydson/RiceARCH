# CONFIGURAÇÃO COMPLETA - TEMA SATURNO
# Usuário: ollie-sh

background {
    monitor =
    path = /home/ollie-sh/wallpapers/saturno.jpg   
    color = rgba(16, 11, 13, 1.0)
    blur_passes = 3
    blur_size = 3
}

# FOTO DE PERFIL
image {
    monitor =
    path = /home/ollie-sh/wallpapers/perfil.jpeg
    size = 120
    rounding = -1 # Círculo perfeito
    border_size = 3
    border_color = rgba(168, 132, 99, 1.0) # saturn-bronze
    position = 0, 200
    halign = center
    valign = center
}

# BOAS-VINDAS
label {
    monitor =
    text = Ollie-sh
    color = rgba(234, 218, 201, 1.0) # ring-cream
    font_size = 22
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, 100
    halign = center
    valign = center
}

# CAMPO DE SENHA
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(168, 132, 99, 1.0) # saturn-bronze
    inner_color = rgba(22, 17, 13, 0.6) # space-black
    font_color = rgba(134, 189, 186, 1.0) # star-cyan
    fade_on_empty = false
    placeholder_text = <span foreground="##EADAC9">Digite a senha...</span>
    hide_input = false
    position = 0, 20
    halign = center
    valign = center
}

# RELÓGIO (NA PARTE INFERIOR)
label {
    monitor =
    text = $TIME
    color = rgba(134, 189, 186, 0.8) # star-cyan com transparência
    font_size = 80
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, 80
    halign = center
    valign = bottom
}

# DATA
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d de %B')"
    color = rgba(234, 218, 201, 0.7) # ring-cream
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, 50
    halign = center
    valign = bottom
}